<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5c518;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Film reel icon -->
  <circle cx="25" cy="25" r="20" fill="none" stroke="url(#logoGrad)" stroke-width="3"/>
  <circle cx="25" cy="25" r="8" fill="url(#logoGrad)"/>
  <circle cx="25" cy="10" r="3" fill="url(#logoGrad)"/>
  <circle cx="25" cy="40" r="3" fill="url(#logoGrad)"/>
  <circle cx="10" cy="25" r="3" fill="url(#logoGrad)"/>
  <circle cx="40" cy="25" r="3" fill="url(#logoGrad)"/>
  <!-- Play triangle -->
  <polygon points="22,20 22,30 30,25" fill="white"/>
  <!-- Text: 观影说 -->
  <text x="55" y="35" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#textGrad)">观影说</text>
</svg>
